name: Accessibility Issue
description: Report an accessibility issue in AuthShield Lab
title: "[A11Y]: "
labels: ["accessibility", "a11y"]
body:
  - type: dropdown
    id: wcag
    attributes:
      label: WCAG Criterion
      description: Which WCAG criterion is violated?
      options:
        - 1.1.1 Non-text Content
        - 1.3.1 Info and Relationships
        - 1.4.3 Contrast (Minimum)
        - 1.4.11 Non-text Contrast
        - 2.1.1 Keyboard
        - 2.4.3 Focus Order
        - 2.4.7 Focus Visible
        - 3.3.2 Labels or Instructions
        - 4.1.2 Name, Role, Value
        - Other
    validations:
      required: true

  - type: input
    id: component
    attributes:
      label: Affected Component
      description: Which component or page is affected?
      placeholder: e.g. Login form, Dashboard, Navigation
    validations:
      required: true

  - type: input
    id: screenreader
    attributes:
      label: Screen Reader Used
      description: Which screen reader were you using, if any?
      placeholder: e.g. NVDA, JAWS, VoiceOver, None

  - type: dropdown
    id: keyboard
    attributes:
      label: Keyboard Navigation Affected
      description: Is keyboard navigation impacted?
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the accessibility issue in detail.
      placeholder: Describe the issue, including how it affects users with disabilities...
    validations:
      required: true

  - type: textarea
    id: fix
    attributes:
      label: Suggested Fix
      description: If you have a suggestion for how to fix this issue, describe it here.
      placeholder: Describe your suggested fix...
