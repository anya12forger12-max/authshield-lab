name: Feature Request
description: Suggest a new feature or enhancement for AuthShield Lab
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module does this feature relate to?
      options:
        - Backend
        - Frontend
        - LMS
        - Simulation
        - Developer SDK
        - Quality
        - Production
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Provide a clear and concise description of the feature.
      placeholder: Describe the feature you'd like...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature important? What problem does it solve?
      placeholder: Describe the motivation or problem this addresses...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
      placeholder: Describe any alternatives you've considered...

  - type: textarea
    id: accessibility
    attributes:
      label: Accessibility Considerations
      description: How does this feature affect accessibility? Does it meet WCAG 2.1 AA standards?
      placeholder: Describe accessibility considerations...

  - type: textarea
    id: security
    attributes:
      label: Security Impact
      description: What security implications does this feature have? Does it introduce new attack vectors?
      placeholder: Describe any security impact...
