[pytest]
testpaths = tests
asyncio_mode = auto

markers =
    unit: Unit tests (fast, isolated, no external dependencies)
    integration: Integration tests (may use database or external services)
    e2e: End-to-end tests (full system, browser-based)
    slow: Slow tests (may take longer than 30 seconds)
    a11y: Accessibility compliance tests
    security: Security-focused tests (injection, auth bypass, etc.)
    perf: Performance and load tests

addopts =
    --strict-markers
    --verbose
    --tb=short
    --cov=src/authshield
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    -ra

filterwarnings =
    error
    default::DeprecationWarning:src.*
    ignore::DeprecationWarning:passlib.*
    ignore::DeprecationWarning:pkg_resources.*
    ignore::DeprecationWarning:google.auth.*
    ignore::PydanticDeprecatedSince20:pydantic.*
    ignore::DeprecationWarning:multipart.*

timeout = 300
timeout_method = signal

log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_level = INFO
log_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

confcutdir = tests
norecursedirs = .git .venv node_modules build dist __pycache__ migrations

minversion = 8.0
