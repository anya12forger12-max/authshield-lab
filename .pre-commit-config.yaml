default_language_version:
  python: python3.12
  node: 20

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.8
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        args: [--config-file=configs/python/pyproject.toml]
        additional_dependencies:
          - pydantic>=2.7.0
          - pydantic-settings>=2.3.0
          - sqlalchemy[asyncio]>=2.0.30
          - types-requests
          - types-python-dateutil
        files: ^(src|tests)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.5.0
    hooks:
      - id: eslint
        files: \.(ts|tsx|js|jsx)$
        types: [file]
        additional_dependencies:
          - eslint@9.5.0
          - "@typescript-eslint/parser@7.14.1"
          - "@typescript-eslint/eslint-plugin@7.14.1"
          - eslint-plugin-import@2.29.1
          - eslint-plugin-react@7.34.3
          - eslint-plugin-react-hooks@4.6.2
          - eslint-plugin-jsx-a11y@6.9.0
          - typescript@5.5.2

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|jsonc|json5|css|scss|html|md|yml|yaml)$
        types: [file]

  - repo: local
    hooks:
      - id: validate-commit-msg
        name: Validate commit message
        entry: |
          bash -c 'msg=$(head -1 "$1"); if ! echo "$msg" | grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .{1,72}$"; then echo "Invalid commit message format. Use: type(scope): description"; echo "Allowed types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"; exit 1; fi' --
        language: system
        stages: [commit-msg]

      - id: check-python-imports
        name: Check Python imports are sorted
        entry: python -m ruff check --select I --fix
        language: system
        types: [python]
        stages: [pre-commit]

      - id: check-typescript-types
        name: Check TypeScript types
        entry: npx tsc --noEmit --project packages/ui/tsconfig.json
        language: system
        files: \.(ts|tsx)$
        stages: [pre-commit]
